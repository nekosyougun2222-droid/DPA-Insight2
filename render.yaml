# Free tier — no credit card for this plan. Data may reset when the instance sleeps/restarts.
# Build: skip install scripts (avoids sharp native compile OOM) and omit devDeps; icons use JS fallback.
services:
  - type: web
    name: dpa-insight
    runtime: node
    plan: free
    # If Root Directory was set to "src", cwd is .../src — step up to repo root where package.json lives.
    autoDeployTrigger: commit
    buildCommand: if [ ! -f package.json ]; then cd ..; fi && npm install --omit=dev --ignore-scripts && node build-icons.js
    startCommand: if [ ! -f package.json ]; then cd ..; fi && node server.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: NODE_ENV
        value: production
      - key: AUTO_START_MODE
        value: web
      - key: AUTO_START_INTERVAL_MINUTES
        value: "30"
