# Free tier. Repo root must contain server.js, build-icons.js, package.json, etc. (push the whole project)
services:
  - type: web
    name: dpa-insight
    runtime: node
    plan: free
    autoDeployTrigger: commit
    buildCommand: npm install --omit=dev --ignore-scripts && node build-icons.js
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: NODE_ENV
        value: production
      - key: AUTO_START_MODE
        value: web
      - key: AUTO_START_INTERVAL_MINUTES
        value: "30"
